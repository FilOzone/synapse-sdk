packages:
  - packages/*
  - examples/*
  - apps/*
  - docs
  - utils

allowBuilds:
  esbuild: true
  keccak: false
  msw: true
  sharp: true
  workerd: true

blockExoticSubdeps: true

catalog:
  '@biomejs/biome': 2.5.0
  '@types/mocha': ^10.0.10
  '@types/node': ^26.0.1
  '@types/react': ^19.2.16
  '@types/react-dom': ^19.2.3
  abitype: ^1.2.0
  mocha: ^11.7.4
  msw: 2.14.6
  ox: ^0.14.29
  typescript: 7.0.2
  viem: ^2.52.0
  wagmi: ^3.0.2
  zod: ^4.3.5
  iso-web: ^3.1.2

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  # first-party (hugomrdias): published and consumed by us immediately
  - iso-ledger
  - iso-web
  - iso-kv
  - iso-base
  - '@hugomrdias/docs'
  - playwright-test

trustPolicy: no-downgrade

trustPolicyExclude:
  # 0.2.0 published manually without provenance (0.1.9 was trusted-published).
  # Remove when republished via trusted CI.
  - '@hugomrdias/docs@0.2.0'
  # Last 4.x (Dec 2024) predates chokidar adopting trusted publishing at 5.0.0.
  # Permanent while anything depends on chokidar@^4.
  - chokidar@4.0.3
  # 3.3.1 (Jan 2025) predates langium adopting trusted publishing at 4.x.
  # Exact-pinned by @mermaid-js/parser; permanent while mermaid pins langium@3.
  - langium@3.3.1
