packages:
  - packages/*
  - examples/*
  - apps/*
  - docs
  - utils

allowBuilds:
  esbuild: true
  keccak: false
  msw: true
  sharp: true
  workerd: true

blockExoticSubdeps: true

catalog:
  '@biomejs/biome': 2.4.15
  '@types/mocha': ^10.0.10
  '@types/node': ^25.6.0
  '@types/react': ^19.2.7
  '@types/react-dom': ^19.2.3
  abitype: ^1.2.0
  mocha: ^11.7.4
  msw: 2.14.6
  ox: ^0.14.16
  typescript: 6.0.3
  viem: ^2.52.0
  wagmi: ^3.0.2
  zod: ^4.3.5

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
  - iso-ledger
  - iso-web
  - iso-kv
  - iso-base
  - '@hugomrdias/docs'
  - viem
  - ox

trustPolicy: no-downgrade

trustPolicyExclude:
  - '@hugomrdias/docs@0.2.0'
  - 'astro-mermaid@2.0.1'
  - 'tinyexec@1.2.2'
  - chokidar@4.0.3
