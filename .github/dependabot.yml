version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 5
    schedule:
      interval: monthly
  - package-ecosystem: npm
    directory: /
    open-pull-requests-limit: 5
    schedule:
      # twice a month (1st and 15th, 09:00 UTC)
      interval: cron
      cronjob: '0 9 1,15 * *'
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "@biomejs/biome"
        update-types: ["version-update:semver-patch"]
